name: Deploy

on:
  workflow_dispatch:
  push:
    branches: [main, master]

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build backend container
        run: docker build -t ghcr.io/${{ github.repository_owner }}/tradexbot-backend:latest ./backend

      - name: Push backend container
        run: docker push ghcr.io/${{ github.repository_owner }}/tradexbot-backend:latest

      - name: Deployment note
        run: |
          echo "Container pushed to GHCR."
          echo "Set up your runtime target (Render/Railway/Fly.io/K8s) to pull this image."
