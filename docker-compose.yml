services:
  backend:
    image: python:3.12-slim
    working_dir: /app
    command: bash -lc "pip install -e .[dev] && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    volumes:
      - ./backend:/app
      - ./.env:/app/.env:ro
    ports:
      - "8000:8000"

  dashboard:
    image: python:3.12-slim
    working_dir: /workspace
    command: bash -lc "pip install streamlit requests && streamlit run dashboard/app.py --server.address 0.0.0.0 --server.port 8501"
    volumes:
      - ./:/workspace
    environment:
      - BACKEND_URL=http://backend:8000
    ports:
      - "8501:8501"
    depends_on:
      - backend
